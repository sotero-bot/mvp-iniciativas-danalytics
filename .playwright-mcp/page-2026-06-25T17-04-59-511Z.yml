            - textbox [ref=e440]:
              - paragraph [ref=e441]: "Barreras y riesgos: 1) Calidad del dato del plan de pozos (probabilidad ALTA): cambios no documentados → mitigación: integración directa con la herramienta de planeación de Operaciones y revisión diaria con el ingeniero de programación. 2) Adopción del Coordinador y del Superintendente (MEDIA): podrían no confiar en el pronóstico inicial → mitigación: piloto en 2 taladros con métricas comparativas y revisión semanal de aciertos/fallas durante 8 semanas. 3) Falta de catálogo único de materiales (ALTA): equivalencias entre proveedores no normalizadas → mitigación: tarea previa de maestrización con Compras (4 semanas de esfuerzo). 4) Dependencia de TI para integrar SAP MM y Power BI con el nuevo modelo (MEDIA): riesgo de cronograma → mitigación: comprometer recursos de TI desde el kickoff y prever capacidad en sprint backlog. 5) Errores del modelo con consecuencias operativas (BAJA pero impacto ALTO): un sub-pronóstico puede causar NPT → mitigación: doble check humano antes de cancelar una orden marco, bandas de confianza en el dashboard. 6) Riesgo financiero: cambios en estructura de contratos marco (MEDIA) → mitigación: aprobación de Gerencia de Compras antes de aplicar recomendaciones del modelo."
