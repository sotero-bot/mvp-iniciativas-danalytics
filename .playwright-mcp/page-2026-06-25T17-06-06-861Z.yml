              - paragraph [ref=e582]: "Valor estratégico: la pérdida que está debajo de este proyecto es de eficiencia operativa y rentabilidad por pozo. Hoy las rush orders y el NPT por falta de stock cuestan a DrillCon entre USD 800k y USD 1.5M anuales en sobrecostos directos e indirectos. Estratégicamente conecta con tres pilares de la organización: (a) Excelencia operativa — reducir tiempos no productivos y mejorar OEE de los taladros, (b) Disciplina financiera — recuperar la imputación de costos por pozo y mejorar la previsibilidad del CAPEX/OPEX de perforación, (c) Sostenibilidad de la cadena de suministro — reducir dependencia de proveedores spot y consolidar relaciones contractuales en mejores términos. Reduce además dos riesgos estratégicos: (1) incumplimiento de cronograma con clientes operadores (multas por días de retraso), (2) deterioro de la relación con proveedores por compras erráticas. Más allá del ahorro, habilita una capacidad de planeación basada en datos que es transferible a otras decisiones de la compañía (logística, mantenimiento, capital de trabajo)."
