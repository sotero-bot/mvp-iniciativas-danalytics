            - paragraph [ref=e328]: "Fuentes disponibles: 1) SAP MM (órdenes de compra, recepciones, maestros de materiales) — confiable, actualizado en línea. 2) Plan de pozos en Excel compartido con Operaciones — actualización semanal, calidad media (cambios verbales no siempre se reflejan). 3) Reportes diarios de perforación (DDR) en PDF — confiables pero no estructurados, requieren parseo. 4) Histórico de consumos por pozo en BI (Power BI) — confiable, 18 meses. 5) Maestros de proveedores con lead times — desactualizado, ~40% sin revisar en el último año. 6) Correos con cotizaciones urgentes — no estructurado, sin trazabilidad. Vacíos críticos: no hay catálogo único de equivalencias entre brocas de distintos fabricantes; no se registran consumos en taladros donde el WiFi falla; el costo real por rush order no se imputa al pozo, queda en una bolsa general."
