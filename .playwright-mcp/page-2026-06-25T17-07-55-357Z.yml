            - paragraph [ref=e329]: "Usuarios principales: (a) Coordinador de Suministros — usa el pronóstico semanal para liberar órdenes con lead time normal y evitar urgencias; decide priorización de compras. (b) Analista de planeación de inventarios — ajusta puntos de reorden por taladro y por consumible. (c) Superintendente de Operaciones de campo — visualiza el riesgo de quiebre de stock por pozo para reprogramar actividades. (d) Gerente de Compras — toma decisiones de contratos marco vs spot a partir de las tendencias de demanda. (e) Finanzas — monitorea sobrecostos por urgencias e imputación correcta al pozo. Capacitación: (a) y (b) usarían el modelo desde el día 1 con un onboarding técnico de 4 horas; (c) y (d) usan solo dashboards, requieren 1 hora; (e) recibe reportes automáticos, no necesita capacitación."
