            - generic [ref=e120]: Copie a solução proposta do mapa de oportunidades e complemente com o que considerar relevante.
            - paragraph [ref=e327]: "Tipo de solución sugerida: Analítica predictiva + BI descriptivo. Oportunidad de mejora: Implementar un modelo de pronóstico de demanda de consumibles que combine (1) el plan de pozos consolidado, (2) consumos históricos por tipo de formación y profundidad y (3) señales operativas en tiempo real (ROP, tiempos no productivos, eventos de cambio de broca), para anticipar al menos 7 a 14 días los requerimientos críticos y reducir las compras urgentes del 35% al 15%. Complemento: un dashboard semanal de stock proyectado vs cobertura por taladro, con alertas tempranas cuando un consumible se acerca al punto de reorden ajustado dinámicamente por el plan operativo."
