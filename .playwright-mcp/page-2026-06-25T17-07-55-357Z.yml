            - paragraph [ref=e326]: "Dolor identificado: Las compras urgentes (rush orders) de consumibles de perforación (brocas tricónicas, brocas PDC, lodos, casing, herramientas de fondo) representan cerca del 35% del volumen mensual y generan sobrecostos del 20% al 28% respecto a órdenes planeadas, además de tiempos muertos en taladros por falta de stock crítico. Contexto adicional: la planeación de demanda se construye en hojas de cálculo a partir de los planes de pozos, pero las desviaciones operativas (cambios de litología, fallas mecánicas) no se reflejan a tiempo en suministros, y los proveedores locales tienen lead times de 5 a 15 días que muchas veces no logramos absorber."
